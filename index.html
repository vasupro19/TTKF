<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>TRAVELYTICS</title>
        <style>
            .ttkWrapper {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                margin: 0;
            }
            .ttkLogo-img {
                /* --- INCREASED THE LOGO SIZE --- */
                width: 500px; /* Adjust this value as needed to get the perfect size for your design */
                height: auto;
                /* --- PULSE ANIMATION CONTINUES --- */
                animation: pulse 1.5s infinite ease-in-out;
            }
            @keyframes pulse {
                0% {
                    transform: scale(1);
                    opacity: 0.7;
                }
                50% {
                    transform: scale(1.05);
                    opacity: 1;
                }
                100% {
                    transform: scale(1);
                    opacity: 0.7;
                }
            }
        </style>
    </head>
    <body>
        <div id="root">
            <div class="splash-screen">
                <div class="loader">
                    <div class="ttkWrapper">
                        <img
                            src="/public//assets/svg/travelytics_logo.svg"
                            alt="Travelytics Logo"
                            class="ttkLogo-img"
                        />
                    </div>
                </div>
            </div>
        </div>
        <script type="module" src="/src/main.jsx"></script>
    </body>
</html>
